<<!DOCTYPE html>
<html>
<head>
	<title>Var e Let</title>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	<script type="text/babel">
		//Escopo global, função e bloco
		if(true){
			let serie = 'Friends'
			console.log(serie)
		}
		console.log(serie)
		//A diferença entre o var e o let é que o let preserva o escopo onde a variável foi criada.
	</script>
</head>
<body>

</body>
</html>
